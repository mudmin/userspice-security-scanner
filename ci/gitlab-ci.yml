# UserSpice Security Scanner — GitLab CI
#
# Include in your .gitlab-ci.yml:
#   include:
#     - local: 'codetest/ci/gitlab-ci.yml'

variables:
  SCANNER_PATH: ./codetest
  PROJECT_NAME: $CI_PROJECT_NAME

stages:
  - lint
  - scan

security-lint:
  stage: lint
  image: bash:latest
  script:
    - for f in ${SCANNER_PATH}/lib/*.sh ${SCANNER_PATH}/scan.sh; do bash -n "$f"; done
  rules:
    - if: $CI_MERGE_REQUEST_ID

security-scan:
  stage: scan
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache bash jq curl
  script:
    - ${SCANNER_PATH}/scan.sh ${PROJECT_NAME} --skip zap --sarif --threshold high
    - REPORT=$(${SCANNER_PATH}/scan.sh --latest ${PROJECT_NAME})
    - jq '.totals' "${REPORT}/summary.json"
    - jq '.severity_summary' "${REPORT}/summary.json"
  artifacts:
    paths:
      - ${SCANNER_PATH}/reports/${PROJECT_NAME}/
    expire_in: 30 days
    reports:
      sast: ${SCANNER_PATH}/reports/${PROJECT_NAME}/**/results.sarif
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_TAG
